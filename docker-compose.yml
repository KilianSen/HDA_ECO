services:
  hda-eco:
    build: .
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/hdaeco
    volumes:
      - up:/app/uploads
      # To import local data files, uncomment the lines below:
      # - ./DATA0001.TXT:/app/DATA0001.TXT
      # - ./DATAOUT.TXT:/app/DATAOUT.TXT
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=hdaeco
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:
  up:
