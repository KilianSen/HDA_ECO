version: '3.8'

services:
  hda-eco:
    image: hda-eco:latest
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://user:password@db:5432/hdaeco
    volumes:
      - up:/app/uploads
      # To import local data files, uncomment the lines below:
      # - ./DATA0001.TXT:/app/DATA0001.TXT
      # - ./DATAOUT.TXT:/app/DATAOUT.TXT
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      update_config:
        parallelism: 1
        delay: 10s
        order: stop-first
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=hdaeco
    volumes:
      - pgdata:/var/lib/postgresql/data
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager

volumes:
  pgdata:
  up:
